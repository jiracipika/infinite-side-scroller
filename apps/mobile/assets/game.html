/**
 * Player entity — the character controlled by the player.
 */

import { InputManager } from '../input/input';



export const DEFAULT_PLAYER_CONFIG = {
  startX,
  startY,
  speed,
  jumpVelocity: -500,
  gravity,
  width,
  height,
};

export class Player {
  x;
  y;
  vx = 0;
  vy = 0;
  readonly width;
  readonly height;
  health = 3;
  maxHealth = 3;
  alive = true;
  score = 0;
  coins = 0;
  distance = 0;
  distanceTraveled = 0;

  invulnerable = false;
  invulnerableTimer = 0;

  // Dash attack
  dashing = false;
  dashTimer = 0;
  dashCooldown = 0;
  dashDirection = 1;
  private readonly DASH_DURATION = 0.15;
  private readonly DASH_SPEED = 600;
  private readonly DASH_COOLDOWN = 0.8;

  // Shield power-up
  shieldActive = false;
  shieldTimer = 0;

  // Magnet power-up
  magnetActive = false;
  magnetTimer = 0;

  // Speed boost
  speedBoostTimer = 0;

  private config;
  onGround = false;
  facingRight = true;
  wallSliding = false;
  touchingWall = false;
  private wasOnGround = false;
  private coyoteTimer = 0;
  private readonly COYOTE_FRAMES = 6;

  // Projectiles
  projectiles: { x; y; vx; life; damage: number }[] = [];
  private shootCooldown = 0;

  constructor(config = DEFAULT_PLAYER_CONFIG) {
    this.config = config;
    this.x = config.startX;
    this.y = config.startY;
    this.width = config.width;
    this.height = config.height;
  }

  update(dt, input, groundY, platforms = []) {
    // Tick timers
    if (this.invulnerableTimer > 0) {
      this.invulnerableTimer--;
      if (this.invulnerableTimer <= 0) this.invulnerable = false;
    }
    if (this.dashCooldown > 0) this.dashCooldown -= dt;
    if (this.shieldTimer > 0) { this.shieldTimer -= dt; if (this.shieldTimer <= 0) this.shieldActive = false; }
    if (this.magnetTimer > 0) { this.magnetTimer -= dt; if (this.magnetTimer <= 0) this.magnetActive = false; }
    if (this.speedBoostTimer > 0) { this.speedBoostTimer -= dt; if (this.speedBoostTimer <= 0) this.config.speed = DEFAULT_PLAYER_CONFIG.speed; }
    if (this.shootCooldown > 0) this.shootCooldown -= dt;

    // Dash attack
    const wantDash = input.isPressed('KeyX') || input.isPressed('ShiftLeft');
    if (wantDash && this.dashCooldown <= 0 && !this.dashing) {
      this.dashing = true;
      this.dashTimer = this.DASH_DURATION;
      this.dashCooldown = this.DASH_COOLDOWN;
      this.dashDirection = this.facingRight ? 1 : -1;
      this.invulnerable = true;
      this.invulnerableTimer = Math.max(this.invulnerableTimer, Math.ceil(this.DASH_DURATION * 60));
    }

    if (this.dashing) {
      this.dashTimer -= dt;
      this.vx = this.dashDirection * this.DASH_SPEED;
      this.vy = 0; // float during dash
      if (this.dashTimer <= 0) {
        this.dashing = false;
      }
      // Still move
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      if (this.x < 0) { this.x = 0; this.vx = 0; }
      this.distance = Math.max(this.distance, Math.floor(this.x / 50));
      this.distanceTraveled += Math.abs(this.vx * dt);
      this._updateProjectiles(dt);
      return;
    }

    // Horizontal movement
    const moveLeft = input.isDown('ArrowLeft') || input.isDown('KeyA');
    const moveRight = input.isDown('ArrowRight') || input.isDown('KeyD');
    const sprint = input.isDown('ShiftRight');
    const maxSpeed = this.config.speed * (sprint ? 1.6 );
    const accel = maxSpeed * 8;
    const friction = maxSpeed * 10;

    if (moveLeft) {
      this.vx = Math.max(this.vx - accel * dt, -maxSpeed);
      this.facingRight = false;
    } else if (moveRight) {
      this.vx = Math.min(this.vx + accel * dt, maxSpeed);
      this.facingRight = true;
    } else {
      if (this.vx > 0) this.vx = Math.max(0, this.vx - friction * dt);
      else if (this.vx < 0) this.vx = Math.min(0, this.vx + friction * dt);
    }

    // Shoot projectile (KeyZ or KeyE)
    const wantShoot = input.isPressed('KeyZ') || input.isPressed('KeyE');
    if (wantShoot && this.shootCooldown <= 0) {
      this.projectiles.push({
        x: this.x + (this.facingRight ? this.width ),
        y: this.y + this.height / 2,
        vx: this.facingRight ? 400 : -400,
        life: 1.5,
        damage,
      });
      this.shootCooldown = 0.3;
    }

    const wantJump = input.isPressed('Space') || input.isPressed('ArrowUp') || input.isPressed('KeyW');

    // Wall slide
    this.wallSliding = false;
    if (!this.onGround && this.touchingWall && this.vy > 0) {
      if (moveLeft && !this.facingRight || moveRight && this.facingRight) {
        this.wallSliding = true;
        this.vy = Math.min(this.vy, 120);
      }
    }

    if (wantJump) {
      if (this.onGround || this.coyoteTimer < this.COYOTE_FRAMES) {
        this.vy = this.config.jumpVelocity;
        this.onGround = false;
        this.coyoteTimer = this.COYOTE_FRAMES;
        this.touchingWall = false;
        this.wallSliding = false;
      } else if (this.wallSliding) {
        this.vy = this.config.jumpVelocity * 0.9;
        this.vx = this.facingRight ? -maxSpeed * 0.7 : maxSpeed * 0.7;
        this.facingRight = !this.facingRight;
        this.touchingWall = false;
        this.wallSliding = false;
      } else if (this.canDoubleJump) {
        this.useDoubleJump();
      }
    }

    this.vy += this.config.gravity * dt;
    if (this.vy > 800) this.vy = 800;

    this.x += this.vx * dt;
    if (this.x < 0) { this.x = 0; this.vx = 0; }
    this.y += this.vy * dt;

    // Platform collision
    let onPlatform = false;
    if (this.vy >= 0) {
      for (const plat of platforms) {
        if (this.x + this.width > plat.x && this.x < plat.x + plat.width) {
          const prevBottom = (this.y + this.height) - this.vy * dt;
          if (prevBottom <= plat.y + 2 && this.y + this.height >= plat.y) {
            this.y = plat.y - this.height;
            this.vy = 0;
            onPlatform = true;
            break;
          }
          if (Math.abs(this.y + this.height - plat.y) < 4 && this.vy >= 0) {
            this.y = plat.y - this.height;
            this.vy = 0;
            onPlatform = true;
            break;
          }
        }
      }
    }

    // Ground collision
    this.wasOnGround = this.onGround;
    const playerBottom = this.y + this.height;

    if (playerBottom >= groundY && groundY !== Infinity) {
      this.y = groundY - this.height;
      this.vy = 0;
      this.onGround = true;
      this.coyoteTimer = 0;
      this.hasDoubleJumped = false;
    } else if (onPlatform) {
      this.onGround = true;
      this.coyoteTimer = 0;
      this.hasDoubleJumped = false;
    } else {
      this.onGround = false;
    }

    if (!this.onGround && this.wasOnGround) this.coyoteTimer = 0;
    if (!this.onGround) this.coyoteTimer++;

    this.distance = Math.max(this.distance, Math.floor(this.x / 50));
    this.distanceTraveled += Math.abs(this.vx * dt);

    this._updateProjectiles(dt);
  }

  private _updateProjectiles(dt) {
    this.projectiles = this.projectiles.filter(p => {
      p.x += p.vx * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  get centerX() { return this.x + this.width / 2; }
  get centerY() { return this.y + this.height / 2; }
  get bottom() { return this.y + this.height; }

  takeDamage(amount) {
    if (this.invulnerable || !this.alive) return false;
    if (this.shieldActive) {
      this.shieldActive = false;
      this.shieldTimer = 0;
      return false;
    }
    this.health = Math.max(0, this.health - amount);
    this.invulnerable = true;
    this.invulnerableTimer = 90; // 1.5 seconds
    if (this.health <= 0) this.alive = false;
    return true;
  }

  heal(amount) {
    this.health = Math.min(this.maxHealth, this.health + amount);
  }

  addCoins(amount) {
    this.coins += amount;
    this.score += amount * 10;
  }

  getBounds() {
    return { x: this.x, y: this.y, width: this.width, height: this.height };
  }

  isStomping() { return this.vy > 0; }

  stompBounce() {
    this.vy = this.config.jumpVelocity * 0.6;
  }

  applySpeedBoost(multiplier, duration = 5) {
    this.config.speed = DEFAULT_PLAYER_CONFIG.speed * multiplier;
    this.speedBoostTimer = duration;
  }

  applyShield(duration = 8) {
    this.shieldActive = true;
    this.shieldTimer = duration;
  }

  applyMagnet(duration = 8) {
    this.magnetActive = true;
    this.magnetTimer = duration;
  }

  private _doubleJump = false;
  hasDoubleJumped = false;
  setDoubleJump(enabled) {
    this._doubleJump = enabled;
    this.hasDoubleJumped = false;
  }
  get canDoubleJump() { return this._doubleJump && !this.hasDoubleJumped; }
  useDoubleJump() {
    if (this.canDoubleJump) {
      this.vy = this.config.jumpVelocity;
      this.hasDoubleJumped = true;
    }
  }
}


// === engine/game-engine.ts ===
/**
 * Main game engine — ties everything together.
 * Manages the game loop, updates all systems, and renders each frame.
 */

import { Camera, DEFAULT_CAMERA_CONFIG } from './camera';
import { ChunkManager } from '../world/chunk-manager';
import { InputManager } from '../input/input';
import { Player, DEFAULT_PLAYER_CONFIG } from '../entities/player';
import { Enemy } from '../entities/Enemy';
import { Slime } from '../entities/Slime';
import { Bat } from '../entities/Bat';
import { Skeleton } from '../entities/Skeleton';
import { Jumper } from '../entities/Jumper';
import { Boss } from '../entities/Boss';
import { ParticleSystem } from '../entities/particles';
import { GameRenderer } from '../rendering/renderer';
import { getBiomeAt } from '../world/biomes';
import { getDifficulty } from '../difficulty';

import { spawnCollectiblesForChunk, spawnEnemiesForChunk } from '../entities/Collectibles';
import { spawnHazardsForChunk, renderHazard, type Hazard } from '../hazards';

const FIXED_DT = 1 / 60;
const MAX_ACCUMULATED = 0.1;


/** AABB collision check */
function aabbOverlap(
  a: { x; y; width; height: number },
  b: { x; y; width; height: number },
) {
  return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
}

export class GameEngine {
  private canvas;
  private ctx;
  private renderer;
  private camera;
  private chunkManager;
  private input;
  private player;
  private particles;

  private animationId: number | null = null;
  private lastTime = 0;
  private accumulated = 0;
  private _running = false;
  private _state = 'playing';

  // FPS tracking
  private fps = 60;
  private frameCount = 0;
  private fpsTimer = 0;

  worldSeed = 42;
  difficulty = getDifficulty(0);

  onGameOver?: () => void;
  onStatsUpdate?: (stats: { score; coins; distance; health; maxHealth; biome; powerUps; fps: number }) => void;

  private wasOnGround = true;

  // Entity management
  private enemies = [];
  private collectibles = [];
  private hazards = [];
  private lastChunkKey = '';

  // Track which chunks have spawned entities
  private spawnedChunks = new Set<number>();

  constructor(canvas, seed?) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d')!;
    if (seed !== undefined) this.worldSeed = seed;

    this.input = new InputManager();
    this.camera = new Camera(DEFAULT_CAMERA_CONFIG);
    this.chunkManager = new ChunkManager(this.worldSeed);
    this.player = new Player(DEFAULT_PLAYER_CONFIG);
    this.player.setDoubleJump(true);
    this.particles = new ParticleSystem();
    this.renderer = new GameRenderer(this.ctx);

    this.handleResize();
    window.addEventListener('resize', this.handleResize);
  }

  get state() { return this._state; }

  pause() { this._state = 'paused'; }
  resume() { this._state = 'playing'; this.lastTime = performance.now(); this.accumulated = 0; }

  setSeed(seed) {
    this.worldSeed = seed;
    this.chunkManager = new ChunkManager(this.worldSeed);
    this.player = new Player(DEFAULT_PLAYER_CONFIG);
    this.player.setDoubleJump(true);
    this.particles.clear();
    this.enemies = [];
    this.collectibles = [];
    this.hazards = [];
    this.spawnedChunks.clear();
    this.lastChunkKey = '';
    this._state = 'playing';
    this.difficulty = getDifficulty(0);
    this.wasOnGround = true;
  }

  private handleResize = () => {
    const dpr = window.devicePixelRatio || 1;
    const rect = this.canvas.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;
    this.canvas.width = width * dpr;
    this.canvas.height = height * dpr;
    this.ctx.scale(dpr, dpr);
    this.renderer.resize(width, height);
    this.camera.setScreenSize(width, height);
  };

  start() {
    if (this._running) return;
    this._running = true;
    this.lastTime = performance.now();
    this.loop(this.lastTime);
  }

  stop() {
    this._running = false;
    if (this.animationId !== null) {
      cancelAnimationFrame(this.animationId);
      this.animationId = null;
    }
  }

  destroy() {
    this.stop();
    this.input.destroy();
    window.removeEventListener('resize', this.handleResize);
  }

  private loop = (currentTime) => {
    if (!this._running) return;
    let dt = (currentTime - this.lastTime) / 1000;
    this.lastTime = currentTime;
    if (dt > 0.1) dt = 0.1;

    // FPS tracking
    this.frameCount++;
    this.fpsTimer += dt;
    if (this.fpsTimer >= 1.0) {
      this.fps = this.frameCount;
      this.frameCount = 0;
      this.fpsTimer = 0;
    }

    if (this._state === 'playing') {
      this.accumulated += dt;
      if (this.accumulated > MAX_ACCUMULATED) this.accumulated = MAX_ACCUMULATED;
      while (this.accumulated >= FIXED_DT) {
        this.update(FIXED_DT);
        this.accumulated -= FIXED_DT;
      }
    }

    this.render();
    this.animationId = requestAnimationFrame(this.loop);
  };

  private getNearbyPlatforms() {
    const chunks = this.chunkManager.getLoadedChunks();
    const platforms = [];
    const px = this.player.centerX;
    const range = 600;
    for (const chunk of chunks) {
      for (const plat of chunk.platforms) {
        if (plat.x > px - range && plat.x + plat.width < px + range) {
          platforms.push(plat);
        }
      }
    }
    return platforms;
  }

  private getGroundY(worldX) {
    const chunks = this.chunkManager.getLoadedChunks();
    const playerLeft = worldX - this.player.width / 2;
    const playerRight = worldX + this.player.width / 2;
    for (const chunk of chunks) {
      for (const cave of chunk.caves) {
        if (playerLeft < cave.x + cave.width && playerRight > cave.x) {
          const surfaceY = chunk.getHeight(cave.x - chunk.worldX);
          if (cave.y <= surfaceY + 10) return Infinity;
        }
      }
    }
    return this.chunkManager.getHeight(worldX);
  }

  private checkWallCollision(): 'left' | 'right' | null {
    const px = this.player.x;
    const py = this.player.y;
    const margin = 2;
    const leftY = this.chunkManager.getHeight(px - margin);
    const rightY = this.chunkManager.getHeight(px + this.player.width + margin);
    const centerBottom = py + this.player.height;
    if (leftY < centerBottom - this.player.height * 0.4 && this.player.vx < 0) return 'left';
    if (rightY < centerBottom - this.player.height * 0.4 && this.player.vx > 0) return 'right';
    return null;
  }

  /** Simple seeded RNG for spawning */
  private seededRng(seed) {
    const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
    return x - Math.floor(x);
  }

  /** Spawn enemies/collectibles/hazards for newly loaded chunks */
  private spawnChunkEntities() {
    const chunks = this.chunkManager.getLoadedChunks();
    for (const chunk of chunks) {
      if (this.spawnedChunks.has(chunk.index)) continue;
      this.spawnedChunks.add(chunk.index);

      const plats = chunk.platforms;
      const chunkWorldX = chunk.worldX;

      // Enemies
      const enemySpawns = spawnEnemiesForChunk(chunk.index, plats, (s) => this.seededRng(s));
      // Apply density scaling — only spawn fraction based on difficulty
      const targetCount = Math.ceil(enemySpawns.length / this.difficulty.densityMult);
      const scaledSpawns = enemySpawns.slice(0, targetCount);

      for (const spawn of scaledSpawns) {
        let enemy;
        switch (spawn.type) {
          case 'slime' = new Slime(spawn.x, spawn.y, spawn.chunkId); break;
          case 'bat' = new Bat(spawn.x, spawn.y, spawn.chunkId); break;
          case 'jumper' = new Jumper(spawn.x, spawn.y, spawn.chunkId); break;
          case 'skeleton' = new Skeleton(spawn.x, spawn.y, spawn.chunkId); break;
          case 'boss' = new Boss(spawn.x, spawn.y, spawn.chunkId); break;
          default;
        }
        enemy.applyDifficulty(
          this.difficulty.speedMult,
          this.difficulty.damageMult,
          this.difficulty.healthMult,
          this.difficulty.detectRangeMult,
        );
        this.enemies.push(enemy);
      }

      // Collectibles
      const newCollectibles = spawnCollectiblesForChunk(chunk.index, chunkWorldX, 800, plats, (s) => this.seededRng(s));
      this.collectibles.push(...newCollectibles);

      // Hazards
      const newHazards = spawnHazardsForChunk(
        chunk.index, plats, chunk.heights, chunkWorldX, (s) => this.seededRng(s)
      );
      this.hazards.push(...newHazards);
    }
  }

  /** Update enemy ground state from terrain */
  private updateEnemyGround(enemy) {
    const groundY = this.chunkManager.getHeight(enemy.x + enemy.width / 2);
    if (enemy.y + enemy.height >= groundY && groundY !== Infinity) {
      enemy.y = groundY - enemy.height;
      enemy.vy = 0;
      enemy.onGround = true;
    } else {
      // Also check platforms
      for (const h of this.hazards) {
        if (h.type === 'falling_platform' && !h.destroyed && h.vy !== undefined && (h.vy === 0 || h.falling === false)) {
          if (enemy.x + enemy.width > h.x && enemy.x < h.x + h.width) {
            if (enemy.vy >= 0 && enemy.y + enemy.height >= h.y && enemy.y + enemy.height <= h.y + 12) {
              enemy.y = h.y - enemy.height;
              enemy.vy = 0;
              enemy.onGround = true;
              return;
            }
          }
        }
      }
      enemy.onGround = false;
    }
  }

  private update(dt) {
    // Update chunks
    this.chunkManager.update(this.player.centerX);

    // Spawn entities for new chunks
    this.spawnChunkEntities();

    // Cleanup far-away entities
    const px = this.player.centerX;
    const cleanupRange = 2000;
    this.enemies = this.enemies.filter(e => e.alive && Math.abs(e.x - px) < cleanupRange);
    this.collectibles = this.collectibles.filter(c => !c.collected && Math.abs(c.x - px) < cleanupRange);
    this.hazards = this.hazards.filter(h => !h.destroyed && Math.abs(h.x - px) < cleanupRange);

    // Ground & platforms
    const groundY = this.getGroundY(this.player.centerX);
    const platforms = this.getNearbyPlatforms();

    // Build platform list including non-falling hazards for player collision
    const allPlatforms = [...platforms];
    for (const h of this.hazards) {
      if (h.type === 'falling_platform' && !h.destroyed && !h.falling && h.vy !== undefined) {
        allPlatforms.push({ x: h.x, y: h.y, width: h.width } as PlatformData);
      }
    }

    const wallSide = this.checkWallCollision();
    this.player.touchingWall = wallSide !== null;
    if (wallSide === 'left') this.player.facingRight = false;
    if (wallSide === 'right') this.player.facingRight = true;

    this.wasOnGround = this.player.onGround;
    this.player.update(dt, this.input, groundY, allPlatforms);

    // Landing particles
    if (this.player.onGround && !this.wasOnGround) {
      this.particles.spawnLanding(this.player.centerX, this.player.bottom);
    }
    if (this.input.isPressed('Space') || this.input.isPressed('ArrowUp') || this.input.isPressed('KeyW')) {
      if (this.player.onGround || this.player.vy < -100) {
        this.particles.spawnJumpDust(this.player.centerX, this.player.bottom);
      }
    }

    // Wall collision
    if (wallSide) {
      const wallX = wallSide === 'left' ? this.player.x - 1 : this.player.x + this.player.width + 1;
      const wallY = this.chunkManager.getHeight(wallX);
      if (wallY < this.player.y + this.player.height - this.player.height * 0.35) {
        if (wallSide === 'left' && this.player.x > 0) {
          this.player.x = wallX + 1; this.player.vx = 0;
        } else if (wallSide === 'right') {
          this.player.x = wallX - this.player.width - 1; this.player.vx = 0;
        }
      }
    }

    // Difficulty
    this.difficulty = getDifficulty(this.player.distanceTraveled);

    // Update falling platforms
    for (const h of this.hazards) {
      if (h.type !== 'falling_platform' || h.destroyed) continue;
      // Check if player is standing on it
      if (h.vy !== undefined) {
        if (!h.falling) {
          if (
            this.player.x + this.player.width > h.x && this.player.x < h.x + h.width &&
            Math.abs(this.player.y + this.player.height - h.y) < 4 && this.player.onGround
          ) {
            h.crumbleTimer = (h.crumbleTimer ?? 0) + dt;
            if (h.crumbleTimer > 0.5) {
              h.falling = true;
            }
          }
        } else {
          h.vy = (h.vy ?? 0) + 800 * dt;
          h.y += h.vy * dt;
          if (h.y > 2000) h.destroyed = true;
        }
      }
    }

    // Update enemies
    const playerBounds = this.player.getBounds();
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;

      enemy.update(dt, this.player.centerX, this.player.centerY);
      this.updateEnemyGround(enemy);

      // Enemy-player collision
      if (aabbOverlap(playerBounds, enemy.getBounds())) {
        // Check stomp
        if (enemy.stompable && this.player.isStomping() && this.player.y + this.player.height < enemy.y + enemy.height * 0.6) {
          enemy.takeDamage(1);
          if (!enemy.alive) {
            this.player.score += 100;
            this.particles.spawnEnemyDeath(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
            this.particles.spawnScorePopup(enemy.x + enemy.width / 2, enemy.y, '+100');
          }
          this.player.stompBounce();
        } else if (this.player.dashing) {
          // Dash kills
          enemy.takeDamage(2);
          if (!enemy.alive) {
            this.player.score += 100;
            this.particles.spawnEnemyDeath(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
            this.particles.spawnScorePopup(enemy.x + enemy.width / 2, enemy.y, '+100');
          }
        } else {
          // Player takes damage
          if (this.player.takeDamage(enemy.effectiveDamage)) {
            // Knockback + screen shake
            const kb = this.player.centerX < enemy.x ? -200 ;
            this.player.vx = kb;
            this.player.vy = -250;
            this.camera.shake(6, 0.3);
            this.particles.spawnScorePopup(this.player.centerX, this.player.y - 10, '-1 ♥', '#ef4444');
          }
        }
      }

      // Player projectiles hitting enemies
      for (const proj of this.player.projectiles) {
        if (aabbOverlap({ x: proj.x - 4, y: proj.y - 4, width, height: 8 }, enemy.getBounds())) {
          enemy.takeDamage(proj.damage);
          proj.life = 0; // destroy projectile
          if (!enemy.alive) {
            this.player.score += 100;
            this.particles.spawnEnemyDeath(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
            this.particles.spawnScorePopup(enemy.x + enemy.width / 2, enemy.y, '+100');
          }
        }
      }

      // Skeleton/Boss projectiles hitting player
      if ('projectiles' in enemy && Array.isArray(enemy.projectiles)) {
        for (const proj of enemy.projectiles as { x; y; width; height; life; damage: number }[]) {
          if (proj.life <= 0) continue;
          if (aabbOverlap({ x: proj.x - proj.width / 2, y: proj.y - proj.height / 2, width: proj.width, height: proj.height }, playerBounds)) {
            if (this.player.takeDamage(proj.damage)) {
              proj.life = 0;
              this.particles.spawnScorePopup(this.player.centerX, this.player.y - 10, '-1 ♥', '#ef4444');
            }
          }
        }
      }
    }

    // Spike hazards
    for (const h of this.hazards) {
      if (h.type !== 'spike') continue;
      if (aabbOverlap(playerBounds, { x: h.x, y: h.y, width: h.width, height: h.height })) {
        if (this.player.takeDamage(1)) {
          this.player.vy = -300;
          this.camera.shake(5, 0.25);
          this.particles.spawnScorePopup(this.player.centerX, this.player.y - 10, '-1 ♥', '#ef4444');
        }
      }
    }

    // Collectibles
    for (const c of this.collectibles) {
      if (c.collected) continue;
      c.animTimer += dt;

      // Magnet attraction
      if (this.player.magnetActive && c.type === 'coin') {
        const dx = this.player.centerX - (c.x + c.width / 2);
        const dy = this.player.centerY - (c.y + c.height / 2);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150 && dist > 0) {
          c.x += (dx / dist) * 400 * dt;
          c.y += (dy / dist) * 400 * dt;
        }
      }

      if (aabbOverlap(playerBounds, c)) {
        c.collected = true;
        switch (c.type) {
          case 'coin':
            this.player.addCoins(1);
            this.particles.spawnCoinSparkle(c.x + c.width / 2, c.y + c.height / 2);
            this.particles.spawnScorePopup(c.x, c.y, '+10', '#fbbf24');
            break;
          case 'health':
            if (this.player.health < this.player.maxHealth) {
              this.player.heal(1);
              this.particles.spawnScorePopup(c.x, c.y, '+1 ♥', '#22c55e');
            }
            break;
          case 'speedBoost':
            this.player.applySpeedBoost(1.5, c.value);
            this.particles.spawnScorePopup(c.x, c.y, 'SPEED!', '#3b82f6');
            break;
          case 'doubleJump':
            this.player.setDoubleJump(true);
            this.particles.spawnScorePopup(c.x, c.y, '2x JUMP!', '#a855f7');
            break;
          case 'shield':
            this.player.applyShield(c.value * 8);
            this.particles.spawnScorePopup(c.x, c.y, 'SHIELD!', '#06b6d4');
            break;
          case 'magnet':
            this.player.applyMagnet(c.value);
            this.particles.spawnScorePopup(c.x, c.y, 'MAGNET!', '#f59e0b');
            break;
        }
      }
    }

    // Camera
    this.camera.update(this.player.centerX, this.player.centerY);

    // Particles
    const biome = getBiomeAt(this.player.centerX);
    const screenW = this.canvas.getBoundingClientRect().width;
    const screenH = this.canvas.getBoundingClientRect().height;
    this.particles.update(this.camera.x, this.camera.y, screenW, screenH, biome.type, dt);

    // Death by falling
    if (this.player.y > 1500) {
      this.player.alive = false;
    }

    if (!this.player.alive) {
      this._state = 'gameover';
      this.camera.shake(8, 0.5);
      this.onGameOver?.();
    }

    // Power-ups for HUD
    const powerUps = [];
    if (this.player.shieldActive) powerUps.push('🛡️');
    if (this.player.magnetActive) powerUps.push('🧲');
    if (this.player.speedBoostTimer > 0) powerUps.push('⚡');

    this.onStatsUpdate?.({
      score: this.player.score,
      coins: this.player.coins,
      distance: this.player.distance,
      health: this.player.health,
      maxHealth: this.player.maxHealth,
      biome: biome.name,
      powerUps,
      fps: this.fps,
    });

    this.input.endFrame();
  }

  private render() {
    const ctx = this.ctx;
    const width = this.canvas.getBoundingClientRect().width;
    const height = this.canvas.getBoundingClientRect().height;
    ctx.clearRect(0, 0, width, height);

    const chunks = this.chunkManager.getLoadedChunks();

    this.renderer.drawSky(this.camera);
    this.renderer.drawParallax(this.camera);
    this.renderer.drawTerrain(chunks, this.camera);
    this.renderer.drawPlatforms(chunks, this.camera);
    this.renderer.drawDecorations(chunks, this.camera);

    // Hazards
    for (const h of this.hazards) {
      renderHazard(ctx, h, this.camera.renderX);
    }

    // Collectibles
    for (const c of this.collectibles) {
      if (c.collected) continue;
      this.renderer.drawCollectible(c, this.camera);
    }

    // Enemies
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      enemy.render(ctx, this.camera.renderX);
    }

    // Player projectiles
    ctx.fillStyle = '#60a5fa';
    for (const p of this.player.projectiles) {
      const sx = p.x - this.camera.renderX;
      ctx.beginPath();
      ctx.arc(sx, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.fillStyle = '#93c5fd80';
      ctx.beginPath();
      ctx.arc(sx, p.y, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#60a5fa';
    }

    // Player
    this.renderer.drawPlayer(this.player, this.camera);

    // Shield visual
    if (this.player.shieldActive) {
      const sx = this.player.x - this.camera.renderX + this.player.width / 2;
      const sy = this.player.y + this.player.height / 2;
      ctx.strokeStyle = '#06b6d480';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, this.player.width * 0.8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#06b6d415';
      ctx.fill();
    }

    // Dash trail
    if (this.player.dashing) {
      ctx.fillStyle = '#4488cc40';
      const sx = this.player.x - this.camera.renderX - this.player.dashDirection * 20;
      ctx.fillRect(sx, this.player.y, this.player.width, this.player.height);
    }

    this.renderer.drawParticles(this.particles.getParticles(), this.camera);

    // Pause overlay
    if (this._state === 'paused') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, width, height);
    }
  }
}


})();
  
  // Create engine and expose control
  const canvas = document.getElementById('gameCanvas');
  const engine = new GameEngine(canvas, 42);
  
  // Set reduced particles for mobile performance (access private field via convention)
  // The constructor runs particles = new ParticleSystem() so we patch the prototype
  
  engine.start();
  
  // Stats callback → post back to React Native
  engine.onStatsUpdate = function(stats) {
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'stats',
      score: stats.score,
      coins: stats.coins,
      distance: stats.distance,
      health: stats.health,
      maxHealth: stats.maxHealth,
      biome: stats.biome,
      fps: stats.fps,
      powerUps: stats.powerUps
    }));
  };
  
  engine.onGameOver = function() {
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'gameover'
    }));
  };
  
  // Expose engine for control
  window.__gameEngine = engine;
  
  // Handle resize
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    engine.renderer.resize(w, h);
    engine.camera.setScreenSize(w, h);
  }
  
  window.addEventListener('resize', resize);
  resize();
  
  // Expose controls
  window.__gameControls = {
    setSeed: function(seed) { engine.setSeed(seed); },
    pause: function() { engine.pause(); },
    resume: function() { engine.resume(); },
    getState: function() { return engine.state; },
  };
  
})();
</script>
