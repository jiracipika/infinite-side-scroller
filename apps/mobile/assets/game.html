// === world/rng.ts ===
/**
 * Seeded PRNG using the mulberry32 algorithm.
 * Deterministic: same seed always produces same sequence.
 */

export function createRng(seed) {
  let state = seed | 0; // Ensure integer

  /** Returns a float in [0, 1) */
  function next() {
    state = (state + 0x6d2b79f5) | 0;
    let t = Math.imul(state ^ (state >>> 15), 1 | state);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }

  /** Returns an integer in [min, max] inclusive */
  function nextInt(min, max) {
    return Math.floor(next() * (max - min + 1)) + min;
  }

  /** Returns a float in [min, max) */
  function nextFloat(min, max) {
    return next() * (max - min) + min;
  }

  /** Returns true with the given probability (0-1) */
  function chance(probability) {
    return next() < probability;
  }

  return { next, nextInt, nextFloat, chance, seed };
}

/**
 * Terrain height calculation using layered sine waves.
 * Produces smooth, natural-looking terrain from a world X coordinate.
 */

/**
 * Simple 1D noise using sine-based hash.
 * Not true Perlin noise, but good enough for smooth terrain.
 */
function noise1D(x, seed) {
  // Combine multiple sine waves for pseudo-random appearance
  const n = Math.sin(x * 12.9898 + seed * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

/**
 * Smooth noise — interpolates between noise samples for smooth curves.
 */
function smoothNoise(x, seed) {
  const ix = Math.floor(x);
  const fx = x - ix;
  // Smoothstep for nice interpolation
  const t = fx * fx * (3 - 2 * fx);

  const a = noise1D(ix, seed);
  const b = noise1D(ix + 1, seed);
  return a + (b - a) * t;
}

/**
 * Get terrain height at a given world X position.
 * Returns the Y coordinate of the ground surface (lower Y = higher on screen).
 *
 * @param worldX - World X coordinate
 * @param seed - World seed for deterministic generation
 * @param biomeHeightVariation - How much the terrain can vary (from biome config)
 * @param biomeHilliness - How hilly the terrain is (0-1, from biome config)
 * @returns Ground surface Y coordinate
 */
export function getTerrainHeight(
  worldX,
  seed,
  biomeHeightVariation = 60,
  biomeHilliness = 0.3
) {
  const BASE_HEIGHT = 400; // Default ground Y (from top of canvas)

  // Layer 1: Large rolling hills
  const largeHill = smoothNoise(worldX * 0.002, seed + 1) * biomeHeightVariation * biomeHilliness;

  // Layer 2: Medium bumps
  const mediumBump = smoothNoise(worldX * 0.008, seed + 2) * biomeHeightVariation * 0.4 * biomeHilliness;

  // Layer 3: Small surface detail
  const smallDetail = smoothNoise(worldX * 0.02, seed + 3) * biomeHeightVariation * 0.15 * biomeHilliness;

  // Combine layers (subtract because lower Y = higher terrain)
  return BASE_HEIGHT - largeHill - mediumBump - smallDetail;
}

/**
 * Get underground depth — whether a position is inside solid ground.
 * Used for caves.
 */
export function isUnderground(worldX, worldY, seed) {
  const surfaceY = getTerrainHeight(worldX, seed);
  return worldY > surfaceY;
}

/**
 * Biome sequence — the order biomes appear as you explore.
 */
const BIOME_ORDER = [
  BiomeType.Grassland,
  BiomeType.Forest,
  BiomeType.Desert,
  BiomeType.Rocky,
  BiomeType.Sky,
  BiomeType.Forest,
  BiomeType.Lava,
  BiomeType.DarkCaves,
  BiomeType.Sky,
  BiomeType.Desert,
  BiomeType.Rocky,
  BiomeType.Grassland,
  BiomeType.Lava,
];

/** Width of a biome region in world pixels */
const BIOME_WIDTH = 8000;

/**
 * Get the biome at a given world X position.
 * Biomes cycle through BIOME_ORDER, each lasting BIOME_WIDTH pixels.
 * Returns the blended config (smooth transitions at edges).
 */
export function getBiomeAt(worldX) {
  const idx = Math.floor(worldX / BIOME_WIDTH);
  const _offset = (worldX % BIOME_WIDTH) / BIOME_WIDTH; // 0-1 within biome (reserved for blending)
  const biomeType = BIOME_ORDER[((idx % BIOME_ORDER.length) + BIOME_ORDER.length) % BIOME_ORDER.length];
  return BIOMES[biomeType];
}

/**
 * Get blended biome colors at a position (for smooth transitions).
 */
export function getBlendedBiomeColors(worldX) {
  const current = getBiomeAt(worldX);
  const nextX = worldX + 200; // Look ahead for blending
  const next = getBiomeAt(nextX);

  // If same biome, no blending needed
  if (current.type === next.type) return current.colors;

  // Blend factor based on proximity to biome boundary
  const biomeStart = Math.floor(worldX / BIOME_WIDTH) * BIOME_WIDTH;
  const distFromStart = worldX - biomeStart;
  const transitionZone = 600; // pixels of blending
  let blend = 0;

  if (distFromStart > BIOME_WIDTH - transitionZone) {
    blend = (distFromStart - (BIOME_WIDTH - transitionZone)) / transitionZone;
    blend = Math.max(0, Math.min(1, blend));
  }

  return blendColors(current.colors, next.colors, blend);
}

/** Linearly interpolate between two color strings */
function blendColors(a, b, t) {
  return {
    ground: lerpColor(a.ground, b.ground, t),
    groundDark: lerpColor(a.groundDark, b.groundDark, t),
    sky: lerpColor(a.sky, b.sky, t),
    skyGradient: lerpColor(a.skyGradient, b.skyGradient, t),
    platform: lerpColor(a.platform, b.platform, t),
  };
}

/** Interpolate between two hex colors */
function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1, 3), 16);
  const g1 = parseInt(c1.slice(3, 5), 16);
  const b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16);
  const g2 = parseInt(c2.slice(3, 5), 16);
  const b2 = parseInt(c2.slice(5, 7), 16);
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
}

/**
 * Chunk data structure.
 * Each chunk is a horizontal slice of the world containing terrain, platforms, decorations, and caves.
 */

import { createRng } from './rng';
import { getTerrainHeight } from './terrain';
import { getBiomeAt, BiomeConfig } from './biomes';

/** Width of each chunk in world pixels */
export const CHUNK_WIDTH = 800;

/** Block types for terrain cells */
const BlockType = {
  Empty: 0,
  Ground: 1,
  Platform: 2
};
Object.freeze(BlockType);

/** A decoration placed in the world */


/** A cave region (hollowed out area underground) */


/** A platform (one-way, jump through from below) */


/** Represents one horizontal chunk of the world */
export class Chunk {
  readonly index;
  readonly worldX; // Left edge in world coords
  readonly biome;

  /** Terrain heights at regular intervals (for rendering) */
  readonly heights;

  /** Platforms in this chunk */
  readonly platforms;

  /** Decorations in this chunk */
  readonly decorations;

  /** Cave regions */
  readonly caves;

  constructor(index, worldSeed) {
    this.index = index;
    this.worldX = index * CHUNK_WIDTH;
    this.biome = getBiomeAt(this.worldX + CHUNK_WIDTH / 2);

    // Create a deterministic RNG for this chunk
    const chunkSeed = (worldSeed * 73856093) ^ (index * 19349663);
    const rng = createRng(Math.abs(chunkSeed));

    // Generate terrain heights at pixel resolution (sampled every 4px for performance)
    this.heights = [];
    for (let x = 0; x <= CHUNK_WIDTH; x += 4) {
      const worldPosX = this.worldX + x;
      this.heights.push(
        getTerrainHeight(worldPosX, worldSeed, this.biome.heightVariation, this.biome.hilliness)
      );
    }

    // Generate platforms
    this.platforms = this.generatePlatforms(rng);

    // Generate caves
    this.caves = this.generateCaves(rng);

    // Generate decorations
    this.decorations = this.generateDecorations(rng);
  }

  /** Get height at a local X offset within this chunk */
  getHeight(localX) {
    const idx = Math.floor(localX / 4);
    if (idx < 0) return this.heights[0];
    if (idx >= this.heights.length - 1) return this.heights[this.heights.length - 1];
    // Interpolate between samples
    const frac = (localX / 4) - idx;
    return this.heights[idx] + (this.heights[idx + 1] - this.heights[idx]) * frac;
  }

  /** Generate platforms for this chunk */
  private generatePlatforms(rng: ReturnType<typeof createRng>) {
    const platforms = [];
    if (rng.next() > this.biome.platformDensity) return platforms;

    const count = rng.nextInt(0, 3);
    for (let i = 0; i < count; i++) {
      const x = rng.nextFloat(100, CHUNK_WIDTH - 100);
      const baseHeight = this.getHeight(x);
      const y = baseHeight - rng.nextFloat(60, 160);
      const width = rng.nextFloat(60, 150);
      const isMoving = rng.chance(0.3);
      platforms.push({
        x: this.worldX + x,
        y,
        width,
        ...(isMoving ? { moveAmp: rng.nextFloat(30, 80), moveSpeed: rng.nextFloat(1, 3) } : {}),
      });
    }
    return platforms;
  }

  /** Generate cave regions */
  private generateCaves(rng: ReturnType<typeof createRng>) {
    const caves = [];
    if (!rng.chance(this.biome.caveChance)) return caves;

    const count = rng.nextInt(1, 3);
    for (let i = 0; i < count; i++) {
      const x = rng.nextFloat(50, CHUNK_WIDTH - 200);
      const baseHeight = this.getHeight(x);
      const y = baseHeight + rng.nextFloat(40, 120);
      const width = rng.nextFloat(80, 200);
      const height = rng.nextFloat(40, 100);
      caves.push({ x: this.worldX + x, y, width, height });
    }
    return caves;
  }

  /** Generate decorations (trees, rocks, bushes) */
  private generateDecorations(rng: ReturnType<typeof createRng>) {
    const decorations = [];
    const slotCount = Math.floor(CHUNK_WIDTH / 60);

    for (let i = 0; i < slotCount; i++) {
      const x = rng.nextFloat(20, CHUNK_WIDTH - 20);
      const height = this.getHeight(x);

      // Skip if inside a cave
      const inCave = this.caves.some(
        c => x + this.worldX >= c.x && x + this.worldX <= c.x + c.width
      );
      if (inCave) continue;

      const roll = rng.next();

      if (roll < this.biome.treeChance) {
        decorations.push({
          type: 'tree',
          x: this.worldX + x,
          y,
          scale: rng.nextFloat(0.7, 1.3),
          variant: rng.nextInt(0, 2),
        });
      } else if (roll < this.biome.treeChance + this.biome.rockChance) {
        decorations.push({
          type: 'rock',
          x: this.worldX + x,
          y,
          scale: rng.nextFloat(0.5, 1.2),
          variant: rng.nextInt(0, 1),
        });
      } else if (roll < this.biome.treeChance + this.biome.rockChance + this.biome.bushChance) {
        decorations.push({
          type: 'bush',
          x: this.worldX + x,
          y,
          scale: rng.nextFloat(0.6, 1.1),
          variant: rng.nextInt(0, 1),
        });
      }
    }

    return decorations;
  }
}

/**
 * Chunk manager — handles loading/unloading chunks around the player.
 * Keeps a cache of nearby chunks and generates new ones on demand.
 */

import { Chunk, CHUNK_WIDTH } from './chunk';

/** How many chunks to keep loaded on each side of the player */
const CHUNK_RANGE = 5;

export class ChunkManager {
  private worldSeed;
  private chunks = new Map<number, Chunk>();

  constructor(worldSeed) {
    this.worldSeed = worldSeed;
  }

  /**
   * Update chunks based on player position.
   * Generates new chunks ahead, removes old ones behind.
   */
  update(playerWorldX) {
    const centerChunk = Math.floor(playerWorldX / CHUNK_WIDTH);
    const minChunk = centerChunk - CHUNK_RANGE;
    const maxChunk = centerChunk + CHUNK_RANGE;

    // Generate any missing chunks in range
    for (let i = minChunk; i <= maxChunk; i++) {
      if (!this.chunks.has(i)) {
        this.chunks.set(i, new Chunk(i, this.worldSeed));
      }
    }

    // Unload chunks outside range
    for (const [idx] of this.chunks) {
      if (idx < minChunk - 1 || idx > maxChunk + 1) {
        this.chunks.delete(idx);
      }
    }
  }

  /** Get a chunk by index, or undefined if not loaded */
  getChunk(index): Chunk | undefined {
    return this.chunks.get(index);
  }

  /** Get all currently loaded chunks */
  getLoadedChunks() {
    return Array.from(this.chunks.values()).sort((a, b) => a.index - b.index);
  }

  /** Get the chunk index for a world X coordinate */
  getChunkIndex(worldX) {
    return Math.floor(worldX / CHUNK_WIDTH);
  }

  /** Get terrain height at any world X (loads chunk if needed) */
  getHeight(worldX) {
    const idx = this.getChunkIndex(worldX);
    let chunk = this.chunks.get(idx);
    if (!chunk) {
      chunk = new Chunk(idx, this.worldSeed);
      this.chunks.set(idx, chunk);
    }
    return chunk.getHeight(worldX - chunk.worldX);
  }

  /** Get number of loaded chunks */
  get loadedCount() {
    return this.chunks.size;
  }
}

/**
 * Difficulty scaling — increases enemy density, speed, and aggression over distance.
 */



/** Get difficulty config based on distance traveled */
export function getDifficulty(distanceTraveled) {
  // Difficulty ramps up over ~10000 pixels
  const t = Math.min(distanceTraveled / 10000, 1);

  return {
    speedMult: 1 + t * 0.8,
    densityMult: 1 + t * 1.5,
    damageMult: 1 + t * 0.5,
    healthMult: 1 + t * 0.5,
    detectRangeMult: 1 + t * 0.5,
    shootCooldownMult: Math.max(0.4, 1 - t * 0.4),
  };
}

/**
 * Base enemy class with AI state machine.
 * All enemies extend this.
 */



export abstract class Enemy {
  x;
  y;
  vx = 0;
  vy = 0;
  width;
  height;
  health;
  maxHealth;
  damage;
  type;
  alive = true;
  facingRight = true;
  onGround = false;
  chunkId;
  animTimer = 0;
  stompable = true;

  // AI state machine
  aiState = 'idle';
  aiStateTimer = 0;
  detectRange = 200;
  attackRange = 150;
  patrolSpeed = 60;

  // Difficulty multipliers
  speedMult = 1;
  damageMult = 1;
  healthMult = 1;

  constructor(x, y, type, config?: Partial<EnemyConfig>) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.width = config?.width ?? 32;
    this.height = config?.height ?? 32;
    this.health = config?.health ?? 1;
    this.maxHealth = this.health;
    this.damage = config?.damage ?? 1;
    this.chunkId = config?.chunkId ?? 0;
  }

  /** Apply difficulty multipliers */
  applyDifficulty(speedMult, damageMult, healthMult, detectMult) {
    this.speedMult = speedMult;
    this.damageMult = damageMult;
    this.healthMult = healthMult;
    this.detectRange *= detectMult;
    // Scale health on spawn
    if (this.health === this.maxHealth) {
      this.health = Math.ceil(this.health * healthMult);
      this.maxHealth = this.health;
    }
  }

  /** Update AI state based on player proximity */
  protected updateAI(dt, playerX, playerY) {
    this.aiStateTimer += dt;
    const dx = playerX - this.x;
    const dy = playerY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const prev = this.aiState;

    if (dist < this.attackRange) {
      this.aiState = 'attack';
    } else if (dist < this.detectRange) {
      this.aiState = 'chase';
    } else {
      // Idle -> patrol cycle
      if (this.aiState === 'idle' && this.aiStateTimer > 1.5 + Math.random()) {
        this.aiState = 'patrol';
        this.aiStateTimer = 0;
        this.facingRight = Math.random() > 0.5;
      } else if (this.aiState === 'patrol' && this.aiStateTimer > 2 + Math.random() * 2) {
        this.aiState = 'idle';
        this.aiStateTimer = 0;
      }
    }

    // On state change, reset timer
    if (prev !== this.aiState) {
      this.aiStateTimer = 0;
    }
  }

  abstract update(dt, playerX, playerY);
  abstract render(ctx, cameraX);

  getBounds() {
    return { x: this.x, y: this.y, width: this.width, height: this.height };
  }

  takeDamage(amount = 1) {
    this.health -= amount;
    if (this.health <= 0) {
      this.health = 0;
      this.alive = false;
    }
  }

  get effectiveDamage() {
    return Math.ceil(this.damage * this.damageMult);
  }
}

/**
 * Slime - Bounces on platforms, damages on contact. Walker type.
 */
import { Enemy } from './Enemy';

const GRAVITY = 1800;
const MOVE_SPEED = 100;

export class Slime extends Enemy {
  private bounceTimer = 0;
  private bounceInterval = 1.5;

  constructor(x, y, chunkId) {
    super(x, y, 'slime', {
      width, height, health, damage, chunkId,
    });
  }

  update(dt, playerX, playerY) {
    if (!this.alive) return;
    this.animTimer += dt;
    this.updateAI(dt, playerX, playerY);

    // Gravity
    this.vy += GRAVITY * dt;
    if (this.vy > 600) this.vy = 600;

    const speed = MOVE_SPEED * this.speedMult;

    if (this.aiState === 'chase') {
      this.facingRight = playerX > this.x;
      this.vx = this.facingRight ? speed * 1.5 : -speed * 1.5;
    } else if (this.aiState === 'patrol') {
      this.vx = this.facingRight ? speed : -speed;
    } else {
      this.vx *= 0.9;
    }

    // Bounce when on ground
    if (this.onGround) {
      this.bounceTimer += dt;
      if (this.bounceTimer >= this.bounceInterval / this.speedMult) {
        this.vy = -300;
        this.bounceTimer = 0;
      }
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }

  render(ctx, cameraX) {
    if (!this.alive) return;
    const sx = this.x - cameraX;
    const sy = this.y;

    // Squish animation
    const squish = this.onGround ? 1 + Math.sin(this.animTimer * 3) * 0.1 : 0.85;
    const w = this.width * (2 - squish);
    const h = this.height * squish;

    ctx.save();
    ctx.fillStyle = '#44BB44';
    ctx.beginPath();
    ctx.ellipse(sx + this.width / 2, sy + this.height, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 6, sy + 6, 5, 5);
    ctx.fillRect(sx + 17, sy + 6, 5, 5);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 8, sy + 8, 2, 2);
    ctx.fillRect(sx + 19, sy + 8, 2, 2);

    ctx.restore();
  }
}

/**
 * Bat - Flies in sine wave, follows player if close
 */
import { Enemy } from './Enemy';

const FLY_SPEED = 120;
const CHASE_SPEED = 200;
const DETECT_RANGE = 250;

export class Bat extends Enemy {
  private baseY;
  private flyTimer = 0;
  private amplitude = 40;
  private frequency = 3;
  private chasing = false;

  constructor(x, y, chunkId) {
    super(x, y, 'bat', {
      width, height, health, damage, chunkId,
    });
    this.baseY = y;
  }

  update(dt, playerX, playerY) {
    if (!this.alive) return;
    this.animTimer += dt;

    // Check if player is close
    const dx = playerX - this.x;
    const dy = playerY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    this.updateAI(dt, playerX, playerY);

    if (this.aiState === 'chase' || this.aiState === 'attack') {
      this.chasing = true;
      const speed = CHASE_SPEED * this.speedMult;
      const angle = Math.atan2(dy, dx);
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
    } else {
      this.chasing = false;
      this.flyTimer += dt;
      const speed = FLY_SPEED * this.speedMult;
      this.vx = this.facingRight ? speed : -speed;
      this.vy = Math.cos(this.flyTimer * this.frequency) * this.amplitude;
    }

    this.facingRight = this.vx > 0;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }

  render(ctx, cameraX) {
    if (!this.alive) return;
    const sx = this.x - cameraX;
    const sy = this.y;

    const wingFlap = Math.sin(this.animTimer * 15) * 8;

    ctx.save();
    ctx.fillStyle = '#8844AA';

    // Body
    ctx.beginPath();
    ctx.ellipse(sx + this.width / 2, sy + this.height / 2, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    ctx.beginPath();
    ctx.moveTo(sx + 6, sy + 8);
    ctx.lineTo(sx - 6, sy + 2 + wingFlap);
    ctx.lineTo(sx + 4, sy + 14);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(sx + 22, sy + 8);
    ctx.lineTo(sx + 34, sy + 2 - wingFlap);
    ctx.lineTo(sx + 24, sy + 14);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#FF4444';
    ctx.fillRect(sx + 9, sy + 6, 3, 3);
    ctx.fillRect(sx + 16, sy + 6, 3, 3);

    ctx.restore();
  }
}

/**
 * Skeleton - Walks on platforms and throws projectiles at the player
 */
import { Enemy } from './Enemy';

const GRAVITY = 1800;
const WALK_SPEED = 80;
const THROW_RANGE = 300;
const THROW_COOLDOWN = 2.0;

export class Skeleton extends Enemy {
  throwTimer = 0;
  public projectiles = [];

  constructor(x, y, chunkId) {
    super(x, y, 'skeleton', {
      width, height, health, damage, chunkId,
    });
  }

  update(dt, playerX, _playerY) {
    if (!this.alive) return;
    this.animTimer += dt;
    this.updateAI(dt, playerX, _playerY);

    // Gravity
    this.vy += GRAVITY * dt;
    if (this.vy > 600) this.vy = 600;

    // Face player
    this.facingRight = playerX > this.x;

    const speed = WALK_SPEED * this.speedMult;
    const cooldown = THROW_COOLDOWN * Math.max(0.4, 1 / this.speedMult);

    if (this.aiState === 'attack') {
      this.vx = 0;
      this.throwTimer += dt;
      if (this.throwTimer >= cooldown) {
        this.throwProjectile(playerX);
        this.throwTimer = 0;
      }
    } else if (this.aiState === 'chase') {
      this.vx = this.facingRight ? speed * 1.5 : -speed * 1.5;
      this.throwTimer += dt;
      if (this.throwTimer >= cooldown * 1.5) {
        this.throwProjectile(playerX);
        this.throwTimer = 0;
      }
    } else {
      this.vx = this.facingRight ? speed * 0.5 : -speed * 0.5;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Update projectiles
    this.projectiles = this.projectiles.filter(p => {
      p.x += p.vx * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  private throwProjectile(targetX) {
    const dir = targetX > this.x ? 1 : -1;
    this.projectiles.push({
      x: this.x + this.width / 2 + dir * 10,
      y: this.y + 10,
      vx: dir * 250,
      width,
      height,
      life,
      damage,
    });
  }

  render(ctx, cameraX) {
    if (!this.alive) return;
    const sx = this.x - cameraX;
    const sy = this.y;

    ctx.save();

    // Body (bone white)
    ctx.fillStyle = '#E8E0D0';
    ctx.fillRect(sx + 4, sy + 12, 20, 24); // torso

    // Skull
    ctx.fillStyle = '#F0E8D8';
    ctx.fillRect(sx + 4, sy, 20, 16);

    // Eye sockets
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 8, sy + 4, 5, 5);
    ctx.fillRect(sx + 17, sy + 4, 5, 5);

    // Red eyes
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(sx + 9, sy + 5, 3, 3);
    ctx.fillRect(sx + 18, sy + 5, 3, 3);

    // Legs
    const legAnim = Math.sin(this.animTimer * 8) * 3;
    ctx.fillStyle = '#D0C8B8';
    ctx.fillRect(sx + 6, sy + 36, 6, 8 + legAnim);
    ctx.fillRect(sx + 16, sy + 36, 6, 8 - legAnim);

    // Render projectiles
    ctx.fillStyle = '#FF4444';
    for (const p of this.projectiles) {
      const px = p.x - cameraX;
      ctx.beginPath();
      ctx.arc(px, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

/**
 * Jumper - Hops toward the player, aggressive at close range
 */
import { Enemy } from './Enemy';

const GRAVITY = 1800;
const HOP_SPEED = 120;
const AGGRESSIVE_SPEED = 200;
const DETECT_RANGE = 300;
const HOP_INTERVAL = 1.0;

export class Jumper extends Enemy {
  private hopTimer = 0;
  private hopInterval = HOP_INTERVAL;
  private chasing = false;

  constructor(x, y, chunkId) {
    super(x, y, 'jumper', {
      width, height, health, damage, chunkId,
    });
  }

  update(dt, playerX, playerY) {
    if (!this.alive) return;
    this.animTimer += dt;
    this.updateAI(dt, playerX, playerY);

    // Gravity
    this.vy += GRAVITY * dt;
    if (this.vy > 600) this.vy = 600;

    // Hop toward player when on ground
    if (this.onGround) {
      this.hopTimer += dt;
      if (this.hopTimer >= this.hopInterval) {
        const speed = (this.aiState === 'chase' ? AGGRESSIVE_SPEED ) * this.speedMult;
        if (this.aiState === 'chase') this.facingRight = playerX > this.x;
        this.vx = this.facingRight ? speed : -speed;
        this.vy = -400 - (this.aiState === 'chase' ? 100 );
        this.hopTimer = 0;
      } else {
        this.vx *= 0.9;
      }
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }

  render(ctx, cameraX) {
    if (!this.alive) return;
    const sx = this.x - cameraX;
    const sy = this.y;

    // Squash/stretch based on vertical velocity
    const stretch = this.onGround ? 1.0 : (this.vy < 0 ? 0.8 : 1.15);
    const w = this.width * (2 - stretch);
    const h = this.height * stretch;

    ctx.save();

    // Body
    ctx.fillStyle = this.chasing ? '#CC4444' : '#CC8844';
    ctx.beginPath();
    ctx.ellipse(sx + this.width / 2, sy + this.height, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs (visible when hopping)
    if (!this.onGround) {
      ctx.fillStyle = '#AA6633';
      ctx.fillRect(sx + 3, sy + this.height - 2, 5, 8);
      ctx.fillRect(sx + this.width - 8, sy + this.height - 2, 5, 8);
    }

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 5, sy + 5, 5, 6);
    ctx.fillRect(sx + 14, sy + 5, 5, 6);
    ctx.fillStyle = this.chasing ? '#FF0000' : '#000';
    ctx.fillRect(sx + 7, sy + 8, 2, 3);
    ctx.fillRect(sx + 16, sy + 8, 2, 3);

    // Angry eyebrows when chasing
    if (this.chasing) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + 5, sy + 4);
      ctx.lineTo(sx + 10, sy + 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sx + 19, sy + 4);
      ctx.lineTo(sx + 14, sy + 6);
      ctx.stroke();
    }

    ctx.restore();
  }
}

/**
 * Boss - Tough enemy spawned every ~50 chunks
 * Large, multi-hit, shoots projectiles in patterns
 */
import { Enemy } from './Enemy';
import { Projectile } from './Skeleton';

const GRAVITY = 1800;
const BOSS_SPEED = 60;
const SHOOT_COOLDOWN = 0.5;

export class Boss extends Enemy {
  public projectiles = [];
  private shootTimer = 0;
  private phaseTimer = 0;
  private phase = 0; // alternates attack patterns

  constructor(x, y, chunkId) {
    super(x, y, 'boss', {
      width, height, health, damage, chunkId,
    });
    this.stompable = false; // can't stomp bosses
  }

  update(dt, playerX, playerY) {
    if (!this.alive) return;
    this.animTimer += dt;
    this.updateAI(dt, playerX, playerY);
    this.phaseTimer += dt;
    this.shootTimer += dt;

    // Gravity
    this.vy += GRAVITY * dt;
    if (this.vy > 600) this.vy = 600;

    // Move toward player
    this.facingRight = playerX > this.x;
    const speed = BOSS_SPEED * this.speedMult;
    this.vx = this.facingRight ? speed : -speed;

    // Phase switch every 5 seconds
    if (this.phaseTimer > 5) {
      this.phase = (this.phase + 1) % 2;
      this.phaseTimer = 0;
    }

    // Shoot projectiles
    const cooldown = SHOOT_COOLDOWN / this.speedMult;
    if (this.shootTimer >= cooldown) {
      this.shootTimer = 0;
      this.shoot(playerX, playerY);
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Update projectiles
    this.projectiles = this.projectiles.filter(p => {
      p.x += p.vx * dt;
      p.y += (p.vy ?? 0) * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  private shoot(targetX, targetY) {
    const dir = targetX > this.x ? 1 : -1;
    const cx = this.x + this.width / 2;
    const cy = this.y + this.height / 2;

    if (this.phase === 0) {
      // Straight shots
      this.projectiles.push({
        x: cx + dir * 20, y, vx: dir * 200, vy,
        width, height, life, damage,
      });
    } else {
      // Spread shot (3 projectiles)
      for (let i = -1; i <= 1; i++) {
        const angle = Math.atan2(targetY - cy, targetX - cx) + i * 0.3;
        this.projectiles.push({
          x, y,
          vx: Math.cos(angle) * 200,
          vy: Math.sin(angle) * 200,
          width, height, life, damage,
        });
      }
    }
  }

  render(ctx, cameraX) {
    if (!this.alive) return;
    const sx = this.x - cameraX;
    const sy = this.y;

    ctx.save();

    // Body
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(sx, sy, this.width, this.height);

    // Darker outline
    ctx.strokeStyle = '#4A0000';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, this.width, this.height);

    // Face
    ctx.fillStyle = '#FFD700';
    const eyeX = this.facingRight ? sx + 30 : sx + 10;
    ctx.fillRect(eyeX, sy + 12, 8, 8);
    ctx.fillRect(eyeX + 14, sy + 12, 8, 8);

    // Angry eyebrows
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(eyeX - 2, sy + 8, 12, 3);
    ctx.fillRect(eyeX + 12, sy + 8, 12, 3);

    // Mouth
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 16, sy + 32, 24, 6);

    // Health bar
    const barW = this.width;
    const barH = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(sx, sy - 10, barW, barH);
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(sx, sy - 10, barW * (this.health / this.maxHealth), barH);

    // Render projectiles
    ctx.fillStyle = '#FF6600';
    for (const p of this.projectiles) {
      const px = p.x - cameraX;
      ctx.beginPath();
      ctx.arc(px, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

/**
 * Particle system for atmospheric effects and gameplay feedback.
 * Handles dust, leaves, snow, sparks, plus gameplay particles:
 * jump dust, landing impact, coin sparkle, enemy death.
 */



export class ParticleSystem {
  private particles = [];
  private maxAmbient = 100;
  private maxGameplay = 200;
  private reducedParticles = false;

  setReducedParticles(v) {
    this.reducedParticles = v;
    this.maxAmbient = v ? 30 ;
    this.maxGameplay = v ? 60 ;
  }

  update(
    cameraX,
    cameraY,
    screenWidth,
    screenHeight,
    biomeType,
    dt
  ) {
    const ambientCount = this.particles.filter(p =>
      p.type !== 'jump_dust' && p.type !== 'landing' && p.type !== 'coin_sparkle' &&
      p.type !== 'enemy_death' && p.type !== 'score_popup'
    ).length;

    // Spawn ambient particles
    if (ambientCount < this.maxAmbient && Math.random() < 0.3) {
      this.spawnAmbient(cameraX, cameraY, screenWidth, screenHeight, biomeType);
    }

    // Update
    for (const p of this.particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // Gravity for gameplay particles
      if (p.type === 'jump_dust' || p.type === 'landing' || p.type === 'enemy_death') {
        p.vy += 200 * dt;
      }
      if (p.type === 'score_popup') {
        p.vy = -60; // float upward
      }

      p.life -= dt;
    }

    this.particles = this.particles.filter(p => p.life > 0);
  }

  private spawnAmbient(cx, cy, sw, sh, biome) {
    const x = cx + Math.random() * sw;
    const y = cy + Math.random() * sh;
    let p;

    switch (biome) {
      case 'forest' = { x, y: y - 20, vx: Math.random() * 30 - 10, vy: Math.random() * 20 + 10, life: Math.random() * 3 + 2, maxLife, size: Math.random() * 3 + 2, color: '#4a7c3f', type: 'leaf' };
        break;
      case 'desert' = { x: cx - 10, y, vx: Math.random() * 60 + 30, vy: Math.random() * 20 - 10, life: Math.random() * 2 + 1, maxLife, size: Math.random() * 2 + 1, color: '#d4a853', type: 'dust' };
        break;
      case 'dark_caves' = { x, y, vx: Math.random() * 10 - 5, vy: Math.random() * 10 - 5, life: Math.random() * 1.5 + 0.5, maxLife, size: Math.random() * 2 + 1, color: '#8888ff', type: 'spark' };
        break;
      default = { x, y, vx: Math.random() * 20 - 10, vy: Math.random() * 5, life: Math.random() * 3 + 2, maxLife, size: Math.random() * 2 + 0.5, color: '#ffffff44', type: 'dust' };
    }
    this.particles.push(p);
  }

  /** Spawn dust when player jumps */
  spawnJumpDust(x, y) {
    const count = this.reducedParticles ? 4 ;
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: x + (Math.random() - 0.5) * 16,
        y,
        vx: (Math.random() - 0.5) * 80,
        vy: -Math.random() * 40 - 10,
        life: 0.3 + Math.random() * 0.2,
        maxLife: 0.5,
        size: Math.random() * 3 + 1,
        color: '#c4a96a',
        type: 'jump_dust',
      });
    }
  }

  /** Spawn impact when player lands */
  spawnLanding(x, y) {
    const count = this.reducedParticles ? 6 ;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const speed = Math.random() * 100 + 30;
      this.particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed * (Math.random() + 0.5),
        vy: -Math.abs(Math.sin(angle) * speed),
        life: 0.3 + Math.random() * 0.2,
        maxLife: 0.5,
        size: Math.random() * 3 + 1,
        color: '#c4a96a',
        type: 'landing',
      });
    }
  }

  /** Spawn sparkle when coin collected */
  spawnCoinSparkle(x, y) {
    const count = this.reducedParticles ? 4 ;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * (Math.random() * 60 + 30),
        vy: Math.sin(angle) * (Math.random() * 60 + 30),
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.7,
        size: Math.random() * 2 + 1,
        color: i % 2 === 0 ? '#fbbf24' : '#fde68a',
        type: 'coin_sparkle',
      });
    }
  }

  /** Spawn death particles when enemy dies */
  spawnEnemyDeath(x, y, color = '#ef4444') {
    const count = this.reducedParticles ? 6 ;
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 150,
        vy: -Math.random() * 120 - 40,
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.7,
        size: Math.random() * 4 + 2,
        color,
        type: 'enemy_death',
      });
    }
  }

  /** Spawn floating score popup */
  spawnScorePopup(x, y, text, color = '#fbbf24') {
    this.particles.push({
      x, y,
      vx,
      vy: -50,
      life: 1.0,
      maxLife: 1.0,
      size,
      color,
      type: 'score_popup',
      text,
    });
  }

  getParticles() { return this.particles; }

  clear() { this.particles = []; }
}


// === entities/Collectibles.ts ===
/**
 * Collectible types, health, speed boost, double jump
 */




/** Create a collectible */
export function createCollectible(
  x, y, type, chunkId
) {
  const sizes: Record<CollectibleType, { w; h; value: number }> = {
    coin: { w, h, value: 10 },
    health: { w, h, value: 1 },
    speedBoost: { w, h, value: 5 },
    doubleJump: { w, h, value: 10 },
    shield: { w, h, value: 1 },
    magnet: { w, h, value: 8 },
  };
  const s = sizes[type];
  return { x, y, width: s.w, height: s.h, type, chunkId, collected, animTimer, value: s.value };
}

/** Spawn collectibles for a chunk based on seed */
export function spawnCollectiblesForChunk(
  chunkId,
  chunkX,
  chunkWidth,
  platforms: { x; y; width: number }[],
  rng: (seed) => number
) {
  const collectibles = [];
  // Simple seeded RNG based on chunk
  const base = chunkId * 13337;

  // Spawn 2-5 coin groups
  const numGroups = 2 + Math.abs(Math.floor(rng(base + 1) * 4));
  for (let g = 0; g < numGroups; g++) {
    const platIdx = Math.floor(rng(base + g * 10 + 2) * platforms.length);
    if (platIdx >= platforms.length) continue;
    const plat = platforms[platIdx];

    // Determine type
    const typeRoll = rng(base + g * 10 + 3);
    let type = 'coin';
    if (typeRoll > 0.94) type = 'shield';
    else if (typeRoll > 0.89) type = 'magnet';
    else if (typeRoll > 0.84) type = 'health';
    else if (typeRoll > 0.79) type = 'speedBoost';
    else if (typeRoll > 0.75) type = 'doubleJump';

    // Place on platform
    const count = type === 'coin' ? 3 + Math.floor(rng(base + g * 10 + 4) * 4) ;
    const startX = plat.x + (rng(base + g * 10 + 5) * (plat.width - count * 20));

    for (let i = 0; i < count; i++) {
      collectibles.push(createCollectible(
        startX + i * 20,
        plat.y - 20,
        type,
        chunkId
      ));
    }
  }

  return collectibles;
}

/** Spawn enemies for a chunk */
export function spawnEnemiesForChunk(
  chunkId,
  platforms: { x; y; width: number }[],
  rng: (seed) => number
): { type; x; y; chunkId: number }[] {
  const enemies: { type; x; y; chunkId: number }[] = [];
  const base = chunkId * 7777;
  const count = 2 + Math.floor(rng(base + 100) * 4);

  for (let i = 0; i < count; i++) {
    const platIdx = Math.floor(rng(base + i * 20 + 101) * platforms.length);
    if (platIdx >= platforms.length) continue;
    const plat = platforms[platIdx];
    const roll = rng(base + i * 20 + 102);

    let type;
    if (roll < 0.35) type = 'slime';
    else if (roll < 0.55) type = 'bat';
    else if (roll < 0.75) type = 'jumper';
    else type = 'skeleton';

    enemies.push({
      type,
      x: plat.x + rng(base + i * 20 + 103) * plat.width,
      y: plat.y - 30,
      chunkId,
    });
  }

  // Boss every 50 chunks
  if (chunkId > 0 && chunkId % 50 === 0 && platforms.length > 0) {
    const plat = platforms[0];
    enemies.push({
      type: 'boss',
      x: plat.x + plat.width / 2 - 28,
      y: plat.y - 70,
      chunkId,
    });
  }

  return enemies;
}

  private handleGameInput: ((e) => void) | null = null;

  constructor() {
    if (typeof window !== 'undefined') {
      window.addEventListener('keydown', this.onKeyDown);
      window.addEventListener('keyup', this.onKeyUp);

      // Listen for touch control events from React overlay
      this.handleGameInput = (e) => {
        const { type, value } = e.detail;
        switch (type) {
          case 'move-left':
            this.touchLeft = !!value;
            break;
          case 'move-right':
            this.touchRight = !!value;
            break;
          case 'jump-press':
            if (value) {
              if (!this.touchJump) this.touchJumpPressed = true;
              this.touchJump = true;
            } else {
              this.touchJump = false;
            }
            break;
          case 'attack-press':
            if (value) {
              if (!this.touchAttack) this.touchAttackPressed = true;
              this.touchAttack = true;
            } else {
              this.touchAttack = false;
            }
            break;
        }
      };
      window.addEventListener('game-input', this.handleGameInput as EventListener);
    }
  }

  private onKeyDown = (e) => {
    if (!this.keys.has(e.code)) {
      this.justPressed.add(e.code);
    }
    this.keys.set(e.code, true);
    if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  };

  private onKeyUp = (e) => {
    this.keys.set(e.code, false);
  };

  /** Check if a key or virtual button is currently held down */
  isDown(code) {
    if (this.keys.get(code)) return true;
    // Map touch controls to key codes
    if (code === 'ArrowLeft' || code === 'KeyA') return this.touchLeft;
    if (code === 'ArrowRight' || code === 'KeyD') return this.touchRight;
    return false;
  }

  /** Check if a key or virtual button was just pressed this frame */
  isPressed(code) {
    if (this.justPressed.has(code)) return true;
    if ((code === 'Space' || code === 'ArrowUp' || code === 'KeyW') && this.touchJumpPressed) {
      return true;
    }
    if ((code === 'KeyE' || code === 'KeyJ') && this.touchAttackPressed) {
      return true;
    }
    return false;
  }

  /** Check if attack is held */
  isAttackDown() {
    return this.keys.get('KeyE') === true || this.keys.get('KeyJ') === true || this.touchAttack;
  }

  /** Call at end of frame to clear just-pressed state */
  endFrame() {
    this.justPressed.clear();
    this.touchJumpPressed = false;
    this.touchAttackPressed = false;
  }

  /** Clean up event listeners */
  destroy() {
    if (typeof window !== 'undefined') {
      window.removeEventListener('keydown', this.onKeyDown);
      window.removeEventListener('keyup', this.onKeyUp);
      if (this.handleGameInput) {
        window.removeEventListener('game-input', this.handleGameInput as EventListener);
      }
    }
  }
}

/**
 * Game renderer — handles all canvas drawing.
 */

import { Camera } from '../engine/camera';
import { Chunk, CHUNK_WIDTH } from '../world/chunk';
import { Player } from '../entities/player';
import { Particle } from '../entities/particles';
import { getBlendedBiomeColors } from '../world/biomes';

export class GameRenderer {
  private ctx;
  private width = 0;
  private height = 0;

  constructor(ctx) {
    this.ctx = ctx;
  }

  resize(width, height) {
    this.width = width;
    this.height = height;
  }

  drawSky(camera) {
    const centerX = camera.renderX + this.width / 2;
    const colors = getBlendedBiomeColors(centerX);

    const gradient = this.ctx.createLinearGradient(0, 0, 0, this.height);
    gradient.addColorStop(0, colors.sky);
    gradient.addColorStop(1, colors.skyGradient);
    this.ctx.fillStyle = gradient;
    this.ctx.fillRect(0, 0, this.width, this.height);
  }

  drawParallax(camera) {
    this.drawMountains(camera, 0.1, 200, '#00000020', 350);
    this.drawMountains(camera, 0.2, 150, '#00000030', 400);
    this.drawClouds(camera);
  }

  private drawMountains(camera, parallaxFactor, amplitude, color, baseY) {
    const offsetX = camera.renderX * parallaxFactor;
    const offsetY = camera.renderY * parallaxFactor * 0.3;

    this.ctx.fillStyle = color;
    this.ctx.beginPath();
    this.ctx.moveTo(0, this.height);

    for (let screenX = 0; screenX <= this.width; screenX += 4) {
      const worldX = screenX + offsetX;
      const h = Math.sin(worldX * 0.003) * amplitude + Math.sin(worldX * 0.007) * amplitude * 0.5;
      const y = baseY - h - offsetY;
      this.ctx.lineTo(screenX, y);
    }

    this.ctx.lineTo(this.width, this.height);
    this.ctx.closePath();
    this.ctx.fill();
  }

  private drawClouds(camera) {
    const offsetX = camera.renderX * 0.05;
    this.ctx.fillStyle = '#ffffff40';

    for (let i = 0; i < 8; i++) {
      const baseX = ((i * 350 + 100) - (offsetX % 2800) + 2800) % 2800 - 200;
      const y = 50 + (i % 3) * 40;
      this.drawCloud(baseX, y, 60 + (i % 3) * 30);
    }
  }

  private drawCloud(x, y, size) {
    const ctx = this.ctx;
    ctx.beginPath(); ctx.ellipse(x, y, size, size * 0.4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x - size * 0.5, y + size * 0.1, size * 0.6, size * 0.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + size * 0.4, y + size * 0.15, size * 0.5, size * 0.25, 0, 0, Math.PI * 2); ctx.fill();
  }

  drawTerrain(chunks, camera) {
    for (const chunk of chunks) {
      if (!camera.isVisible(chunk.worldX, 0, CHUNK_WIDTH + 4, this.height)) continue;
      this.drawChunkTerrain(chunk, camera);
    }
  }

  private drawChunkTerrain(chunk, camera) {
    const ctx = this.ctx;
    const colors = getBlendedBiomeColors(chunk.worldX + 400);

    ctx.fillStyle = colors.groundDark;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < chunk.heights.length; i++) {
      const worldX = chunk.worldX + i * 4;
      const screen = camera.worldToScreen(worldX, chunk.heights[i]);
      if (!started) { ctx.moveTo(screen.x, screen.y); started = true; }
      else { ctx.lineTo(screen.x, screen.y); }
    }
    const lastWorldX = chunk.worldX + (chunk.heights.length - 1) * 4;
    const lastScreen = camera.worldToScreen(lastWorldX, chunk.heights[chunk.heights.length - 1]);
    ctx.lineTo(lastScreen.x, this.height + 10);
    const firstScreen = camera.worldToScreen(chunk.worldX, chunk.heights[0]);
    ctx.lineTo(firstScreen.x, this.height + 10);
    ctx.closePath();
    ctx.fill();

    // Grass line
    ctx.strokeStyle = colors.ground;
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i = 0; i < chunk.heights.length; i++) {
      const worldX = chunk.worldX + i * 4;
      const screen = camera.worldToScreen(worldX, chunk.heights[i]);
      if (i === 0) ctx.moveTo(screen.x, screen.y);
      else ctx.lineTo(screen.x, screen.y);
    }
    ctx.stroke();

    // Caves
    for (const cave of chunk.caves) {
      const screen = camera.worldToScreen(cave.x, cave.y);
      ctx.fillStyle = colors.sky;
      ctx.globalAlpha = 0.7;
      ctx.fillRect(screen.x, screen.y, cave.width, cave.height);
      ctx.globalAlpha = 1.0;
      ctx.strokeStyle = colors.groundDark;
      ctx.lineWidth = 2;
      ctx.strokeRect(screen.x, screen.y, cave.width, cave.height);
    }
  }

  drawPlatforms(chunks, camera) {
    const ctx = this.ctx;
    for (const chunk of chunks) {
      const colors = getBlendedBiomeColors(chunk.worldX + 400);
      for (const platform of chunk.platforms) {
        const screen = camera.worldToScreen(platform.x, platform.y);
        if (screen.x + platform.width < 0 || screen.x > this.width) continue;
        ctx.fillStyle = colors.platform;
        ctx.fillRect(screen.x, screen.y, platform.width, 8);
        ctx.strokeStyle = colors.groundDark;
        ctx.lineWidth = 1;
        ctx.strokeRect(screen.x, screen.y, platform.width, 8);
      }
    }
  }

  drawDecorations(chunks, camera) {
    for (const chunk of chunks) {
      for (const dec of chunk.decorations) {
        if (!camera.isVisible(dec.x - 40, dec.y - 100, 80, 100)) continue;
        this.drawDecoration(dec, camera);
      }
    }
  }

  private drawDecoration(dec: { type; x; y; scale; variant: number }, camera) {
    const s = dec.scale;
    const screen = camera.worldToScreen(dec.x, dec.y);
    switch (dec.type) {
      case 'tree': this.drawTree(screen.x, screen.y, s, dec.variant); break;
      case 'rock': this.drawRock(screen.x, screen.y, s, dec.variant); break;
      case 'bush': this.drawBush(screen.x, screen.y, s, dec.variant); break;
    }
  }

  private drawTree(x, y, scale, variant) {
    const ctx = this.ctx;
    const s = scale;
    ctx.fillStyle = '#5a3e1b';
    ctx.fillRect(x - 4 * s, y - 30 * s, 8 * s, 30 * s);
    const greens = ['#2d7a27', '#3a8a34', '#4a9c44'];
    ctx.fillStyle = greens[variant % greens.length];
    if (variant === 0) {
      ctx.beginPath(); ctx.arc(x, y - 40 * s, 20 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x - 8 * s, y - 35 * s, 14 * s, 0, Math.PI * 2); ctx.fill();
    } else if (variant === 1) {
      ctx.beginPath(); ctx.moveTo(x, y - 65 * s); ctx.lineTo(x - 18 * s, y - 20 * s); ctx.lineTo(x + 18 * s, y - 20 * s); ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(x, y - 35 * s, 16 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 10 * s, y - 30 * s, 12 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x - 10 * s, y - 28 * s, 13 * s, 0, Math.PI * 2); ctx.fill();
    }
  }

  private drawRock(x, y, scale, variant) {
    const ctx = this.ctx;
    const s = scale;
    ctx.fillStyle = variant === 0 ? '#8a8a8a' : '#6a6a6a';
    ctx.beginPath(); ctx.ellipse(x, y - 5 * s, 12 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  }

  private drawBush(x, y, scale, variant) {
    const ctx = this.ctx;
    const s = scale;
    const greens = ['#3a7a34', '#4a8a44'];
    ctx.fillStyle = greens[variant % greens.length];
    ctx.beginPath(); ctx.arc(x, y - 6 * s, 10 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 7 * s, y - 4 * s, 7 * s, 0, Math.PI * 2); ctx.fill();
  }

  drawPlayer(player, camera) {
    const ctx = this.ctx;
    const screen = camera.worldToScreen(player.x, player.y);

    // Invulnerability flash
    if (player.invulnerable && !player.dashing) {
      ctx.globalAlpha = Math.floor(player.invulnerableTimer / 4) % 2 === 0 ? 0.4 : 1.0;
    }
    const w = player.width;
    const h = player.height;

    // Body
    ctx.fillStyle = '#4488cc';
    ctx.fillRect(screen.x, screen.y, w, h);

    // Eyes on the facing side
    const eyeX = player.facingRight ? screen.x + w - 12 : screen.x + 4;
    ctx.fillStyle = '#fff';
    ctx.fillRect(eyeX, screen.y + 6, 4, 4);
    ctx.fillRect(eyeX + 6, screen.y + 6, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(eyeX + 2, screen.y + 8, 2, 2);
    ctx.fillRect(eyeX + 8, screen.y + 8, 2, 2);

    // Outline
    ctx.strokeStyle = '#2a5a8a';
    ctx.lineWidth = 1;
    ctx.strokeRect(screen.x, screen.y, w, h);

    // Wall slide indicator
    if (player.wallSliding) {
      ctx.fillStyle = '#ffffff60';
      const slideX = player.facingRight ? screen.x + w : screen.x - 2;
      ctx.fillRect(slideX, screen.y + 4, 2, h - 8);
    }

    ctx.globalAlpha = 1.0;
  }

  drawCollectible(c, camera) {
    const ctx = this.ctx;
    const screen = camera.worldToScreen(c.x, c.y);
    const bob = Math.sin(c.animTimer * 3) * 3;
    const sy = screen.y + bob;

    ctx.save();
    switch (c.type) {
      case 'coin': {
        // Gold coin
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.arc(screen.x + c.width / 2, sy + c.height / 2, c.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.arc(screen.x + c.width / 2, sy + c.height / 2, c.width / 3, 0, Math.PI * 2);
        ctx.fill();
        // $ symbol
        ctx.fillStyle = '#92400e';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('$', screen.x + c.width / 2, sy + c.height / 2 + 4);
        break;
      }
      case 'health': {
        ctx.fillStyle = '#ef4444';
        ctx.font = `${c.width}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillText('♥', screen.x + c.width / 2, sy + c.height);
        break;
      }
      case 'speedBoost': {
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath();
        ctx.arc(screen.x + c.width / 2, sy + c.height / 2, c.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('⚡', screen.x + c.width / 2, sy + c.height / 2 + 4);
        break;
      }
      case 'doubleJump': {
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.arc(screen.x + c.width / 2, sy + c.height / 2, c.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('⇈', screen.x + c.width / 2, sy + c.height / 2 + 4);
        break;
      }
      case 'shield': {
        ctx.fillStyle = '#06b6d4';
        ctx.beginPath();
        ctx.arc(screen.x + c.width / 2, sy + c.height / 2, c.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('🛡', screen.x + c.width / 2, sy + c.height / 2 + 5);
        break;
      }
      case 'magnet': {
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.arc(screen.x + c.width / 2, sy + c.height / 2, c.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('🧲', screen.x + c.width / 2, sy + c.height / 2 + 5);
        break;
      }
    }
    ctx.restore();
  }

  drawParticles(particles, camera) {
    const ctx = this.ctx;

    for (const p of particles) {
      const screen = camera.worldToScreen(p.x, p.y);
      const alpha = Math.max(0, p.life / p.maxLife);

      // Score popups are text
      if (p.type === 'score_popup' && p.text) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.font = `bold ${p.size}px system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, screen.x, screen.y);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
        continue;
      }

      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = p.color;

      switch (p.type) {
        case 'leaf':
          ctx.save();
          ctx.translate(screen.x, screen.y);
          ctx.rotate(p.life * 2);
          ctx.fillRect(-p.size, -p.size / 2, p.size * 2, p.size);
          ctx.restore();
          break;
        case 'snow':
          ctx.beginPath(); ctx.arc(screen.x, screen.y, p.size, 0, Math.PI * 2); ctx.fill();
          break;
        case 'coin_sparkle':
          ctx.beginPath(); ctx.arc(screen.x, screen.y, p.size, 0, Math.PI * 2); ctx.fill();
          // Extra glow
          ctx.globalAlpha = alpha * 0.3;
          ctx.beginPath(); ctx.arc(screen.x, screen.y, p.size * 2, 0, Math.PI * 2); ctx.fill();
          break;
        case 'enemy_death':
          ctx.fillRect(screen.x - p.size / 2, screen.y - p.size / 2, p.size, p.size);
          break;
        default:
          ctx.fillRect(screen.x, screen.y, p.size, p.size);
      }
    }
    ctx.globalAlpha = 1.0;
  }
}

/**
 * Camera system — smoothly follows the player with look-ahead, dead zone, and screen shake.
 */



export const DEFAULT_CAMERA_CONFIG = {
  lookAheadX: 0.25,
  deadZoneX,
  deadZoneY,
  lerpSpeed: 0.08,
};

export class Camera {
  /** Camera position (top-left corner in world coords) */
  x = 0;
  y = 0;

  /** Final position after shake (use for rendering) */
  get renderX() { return this.x + this.shakeOffsetX; }
  get renderY() { return this.y + this.shakeOffsetY; }

  private targetX = 0;
  private targetY = 0;
  private config;
  private screenWidth = 800;
  private screenHeight = 600;

  // Screen shake
  private shakeIntensity = 0;
  private shakeDuration = 0;
  private shakeTimer = 0;
  private shakeOffsetX = 0;
  private shakeOffsetY = 0;

  constructor(config = DEFAULT_CAMERA_CONFIG) {
    this.config = config;
  }

  setScreenSize(width, height) {
    this.screenWidth = width;
    this.screenHeight = height;
  }

  /** Trigger a screen shake */
  shake(intensity = 4, duration = 0.3) {
    this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
    this.shakeDuration = Math.max(this.shakeDuration, duration);
    this.shakeTimer = this.shakeDuration;
  }

  update(playerX, playerY) {
    // Desired camera position with look-ahead
    const desiredX = playerX - this.screenWidth * (0.5 + this.config.lookAheadX);
    const desiredY = playerY - this.screenHeight * 0.5;

    // Always update target — lerp provides the smoothing
    this.targetX = desiredX;
    this.targetY = desiredY;

    // Smooth lerp
    this.x += (this.targetX - this.x) * this.config.lerpSpeed;
    this.y += (this.targetY - this.y) * this.config.lerpSpeed;

    // Don't go above sky
    if (this.y < -200) this.y = -200;

    // Update shake
    if (this.shakeTimer > 0) {
      this.shakeTimer -= 1 / 60;
      const decay = this.shakeTimer / this.shakeDuration;
      const intensity = this.shakeIntensity * decay;
      this.shakeOffsetX = (Math.random() * 2 - 1) * intensity;
      this.shakeOffsetY = (Math.random() * 2 - 1) * intensity;
    } else {
      this.shakeOffsetX = 0;
      this.shakeOffsetY = 0;
      this.shakeIntensity = 0;
      this.shakeDuration = 0;
    }
  }

  /** Convert world → screen using shake-adjusted position */
  worldToScreen(worldX, worldY): { x; y: number } {
    return {
      x: worldX - this.renderX,
      y: worldY - this.renderY,
    };
  }

  screenToWorld(screenX, screenY): { x; y: number } {
    return {
      x: screenX + this.x,
      y: screenY + this.y,
    };
  }

  isVisible(worldX, worldY, width, height) {
    return (
      worldX + width > this.x &&
      worldX < this.x + this.screenWidth &&
      worldY + height > this.y &&
      worldY < this.y + this.screenHeight
    );
  }
}


// === hazards/index.ts ===
/**
 * Hazards - Spikes and falling platforms
 */



/** Spawn hazards for a chunk */
export function spawnHazardsForChunk(
  chunkId,
  platforms: { x; y; width: number }[],
  heights,
  chunkWorldX,
  rng: (seed) => number
) {
  const hazards = [];
  const base = chunkId * 9999;

  // Spikes on ground (every chunk has a chance)
  if (rng(base + 200) > 0.4) {
    const spikeCount = 1 + Math.floor(rng(base + 201) * 3);
    for (let i = 0; i < spikeCount; i++) {
      const localX = rng(base + i * 30 + 202) * 700 + 50;
      const heightIdx = Math.floor(localX / 4);
      if (heightIdx < heights.length) {
        const groundY = heights[heightIdx];
        hazards.push({
          type: 'spike',
          x: chunkWorldX + localX,
          y: groundY - 12,
          width: 24 + Math.floor(rng(base + i * 30 + 203) * 3) * 8,
          height,
          chunkId,
        });
      }
    }
  }

  // Falling platforms (replace some regular platforms)
  for (let i = 0; i < platforms.length; i++) {
    if (rng(base + i * 50 + 300) > 0.65) {
      hazards.push({
        type: 'falling_platform',
        x: platforms[i].x,
        y: platforms[i].y,
        width: platforms[i].width,
        height,
        chunkId,
        crumbleTimer,
        falling,
        vy,
        destroyed,
        originalY: platforms[i].y,
      });
    }
  }

  return hazards;
}

/** Render a hazard */
export function renderHazard(ctx, h, cameraX) {
  const sx = h.x - cameraX;
  const sy = h.type === 'falling_platform' ? h.y : h.y;

  if (h.destroyed) return;

  ctx.save();

  if (h.type === 'spike') {
    // Draw triangular spikes
    const count = Math.floor(h.width / 12);
    ctx.fillStyle = '#888';
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    for (let i = 0; i < count; i++) {
      const bx = sx + i * 12;
      ctx.beginPath();
      ctx.moveTo(bx, sy + h.height);
      ctx.lineTo(bx + 6, sy);
      ctx.lineTo(bx + 12, sy + h.height);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    // Metallic shine
    ctx.fillStyle = '#AAA';
    for (let i = 0; i < count; i++) {
      const bx = sx + i * 12;
      ctx.beginPath();
      ctx.moveTo(bx + 3, sy + h.height);
      ctx.lineTo(bx + 6, sy + 3);
      ctx.lineTo(bx + 6, sy + h.height);
      ctx.closePath();
      ctx.fill();
    }
  } else if (h.type === 'falling_platform') {
    // Crumbling platform - visual shake when timer is active
    const shakeX = h.crumbleTimer && h.crumbleTimer > 0 && !h.falling
      ? (Math.random() - 0.5) * 2 ;
    const alpha = h.crumbleTimer && h.crumbleTimer > 0.4 ? 0.6 : 1.0;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(sx + shakeX, sy, h.width, h.height);
    // Crack lines when crumbling
    if (h.crumbleTimer && h.crumbleTimer > 0) {
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 1;
      const cx = sx + h.width / 2 + shakeX;
      ctx.beginPath();
      ctx.moveTo(cx - 8, sy + 2);
      ctx.lineTo(cx, sy + h.height / 2);
      ctx.lineTo(cx + 6, sy + h.height - 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}
