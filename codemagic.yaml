workflows:
  eas-android:
    name: "EAS Build Android"
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - expo
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd apps/mobile
          npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Run EAS Build (preview APK)
        script: |
          cd apps/mobile
          eas build --platform android --profile preview --non-interactive
    artifacts:
      - apps/mobile/build/**/*
    publishing:
      email:
        recipients:
          - rajingajadhar@gmail.com
        notify:
          success: true
          failure: true
